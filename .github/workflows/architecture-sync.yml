name: Architecture sync

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  architecture-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify ARCHITECTURE.md lists all packages
        run: python scripts/check_architecture_sync.py
      - name: Pytest architecture sync test
        run: pip install pytest pydantic requests && python -m pytest tests/test_architecture_sync.py -q
